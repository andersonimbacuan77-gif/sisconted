<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if(localStorage.getItem('userRol') !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración Avanzada - SISCONTED</title>
    <script src="api.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --secondary: #0ea5e9;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0a0b14;
            --sidebar-bg: #111827;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f3f4f6;
            --text-muted: #94a3b8;
        }

        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(14, 165, 233, 0.03) 0%, transparent 40%);
            margin: 0;
            padding: 40px 60px;
            color: var(--text);
            min-height: 100vh;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--sidebar-bg);
            padding: 24px 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 48px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            color: white;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1::before {
            content: '';
            width: 6px;
            height: 24px;
            background: var(--primary);
            border-radius: 3px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-back:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px var(--primary-glow);
        }

        .btn-back:active {
            transform: translateY(0) scale(0.95);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 32px;
            padding-bottom: 60px;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        .section-card:hover { border-color: rgba(255, 255, 255, 0.15); }

        .section-card h2 {
            font-size: 0.9rem;
            margin: 0 0 24px 0;
            font-weight: 700;
            color: var(--primary-light);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .form-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        input, select {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            font-size: 0.9rem;
            width: 100%;
            background: var(--bg);
            color: white;
            transition: 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .permiso-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #374151;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            min-width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem;
        }
        .btn-add:hover { 
            background: var(--primary-light); 
            transform: translateY(-2px); 
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        .btn-add:active { transform: translateY(0) scale(0.9); }

        .list-container {
            flex: 1;
            overflow-y: auto;
            max-height: 400px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .list-item:hover { border-color: rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.04); }

        .btn-text-del {
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.1);
            background: rgba(239, 68, 68, 0.05);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-text-del:hover { 
            background: var(--danger); 
            color: white; 
            border-color: var(--danger);
            transform: scale(1.05);
        }
        .btn-text-del:active { transform: scale(0.95); }

        .user-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: 0.2s;
        }
        .user-row:hover { border-color: var(--primary-glow); }

        .user-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .badge {
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-admin { background: rgba(99, 102, 241, 0.1); color: var(--primary-light); border: 1px solid rgba(99, 102, 241, 0.2); }
        .badge-cliente { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }

        .user-edit-panel {
            padding: 24px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border);
            display: none;
        }

        .btn-save-user {
            background: var(--success);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }
        .btn-save-user:hover { 
            background: #059669; 
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }
        .btn-save-user:active { transform: translateY(0) scale(0.98); }

        .visible { display: block !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
            .main { padding: 20px; overflow-y: visible; }
            .config-grid { grid-template-columns: 1fr; }
            .modal-content { width: 95%; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚙️ Configuración <span style="font-weight:300; color:var(--text-muted); font-size: 1rem;">| Panel Dark</span></h1>
        <button class="btn-back" onclick="window.location.href='index.html'">Regresar al Panel</button>
    </div>

    <div class="container">
        <div class="section-card">
            <h2>📁 Categorías</h2>
            <div class="form-group">
                <input type="text" id="nueva-cat" placeholder="Ej: Pinturas">
                <button class="btn-add" onclick="agregarConfig('categorias', 'nueva-cat')">+</button>
            </div>
            <div id="lista-categorias" class="list-container"></div>
        </div>

        <div class="section-card">
            <h2>📏 Unidades de Medida</h2>
            <div class="form-group">
                <input type="text" id="nueva-uni" placeholder="Ej: Litros">
                <button class="btn-add" onclick="agregarConfig('unidades', 'nueva-uni')">+</button>
            </div>
            <div id="lista-unidades" class="list-container"></div>
        </div>

        <div class="section-card">
            <h2>👥 Gestión de Accesos</h2>
            <div id="lista-usuarios" class="list-container"></div>
        </div>

        <div class="section-card">
            <h2>🛡️ Seguridad del Sistema</h2>
            <div class="permiso-row" style="background: rgba(255, 255, 255, 0.05); margin-top: 10px;">
                <div>
                    <span style="font-weight:700; color:var(--warning); display:block;">Bloquear Registro</span>
                    <small style="color:var(--text-muted); font-size:0.7rem;">Impide que nuevos usuarios se registren desde el catálogo.</small>
                </div>
                <label class="switch">
                    <input type="checkbox" id="lock-reg-switch">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="btn-save-user" onclick="guardarSeguridad()" style="background: var(--warning); color: #000; margin-top: 15px;">ACTUALIZAR SEGURIDAD</button>
        </div>

        <div class="section-card">
            <h2>🏢 Datos de la Empresa</h2>
            <div class="user-row" style="margin-top: 0;">
                <div class="user-header" onclick="toggleEmpresa()">
                    <span id="label-emp-nombre" style="font-weight:700; color:var(--primary);">Configurar Empresa</span>
                    <span class="badge badge-admin">Editar</span>
                </div>
                <div id="panel-empresa" class="user-edit-panel">
                    <div class="form-group" style="flex-direction: column; gap: 15px; margin-bottom: 0;">
                        <div>
                            <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Razón Social / Nombre</label>
                            <input type="text" id="emp-nombre" placeholder="Nombre de la empresa">
                        </div>
                        <div>
                            <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">NIT / Documento</label>
                            <input type="text" id="emp-nit" placeholder="NIT o CC">
                        </div>
                        <div>
                            <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Dirección</label>
                            <input type="text" id="emp-direccion" placeholder="Calle/Carrera # 00-00">
                        </div>
                        <div>
                            <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Teléfono / Celular</label>
                            <input type="text" id="emp-telefono" placeholder="321 000 0000">
                        </div>
                        <div>
                            <label style="font-size:0.7rem; color:var(--whatsapp); text-transform:uppercase; font-weight:700;">Teléfono Proveedor (Pedidos WhatsApp)</label>
                            <input type="number" id="emp-proveedor" placeholder="Ej: 573215122980" style="border-color: var(--whatsapp);">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div>
                                <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Régimen Fiscal</label>
                                <select id="emp-regimen">
                                    <option value="no-responsable">No Responsable de IVA</option>
                                    <option value="responsable">Responsable de IVA</option>
                                </select>
                            </div>
                            <div>
                                <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Modo de Cálculo IVA</label>
                                <select id="emp-iva-modo" style="border-color: var(--warning);">
                                    <option value="incluido">IVA Incluido en Precio (Desglose)</option>
                                    <option value="adicionado">IVA Adicionado al Precio (Suma)</option>
                                </select>
                            </div>
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Correo Fiscal</label>
                            <input type="email" id="emp-correo" placeholder="factura@empresa.com">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div>
                                <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Municipio</label>
                                <input type="text" id="emp-municipio" placeholder="Ej: Pasto">
                            </div>
                            <div>
                                <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Departamento</label>
                                <input type="text" id="emp-depto" placeholder="Ej: Nariño">
                            </div>
                        </div>

                        <!-- SECCIÓN DIAN PROFESIONAL -->
                        <div style="margin-top: 15px; padding: 20px; background: rgba(99, 102, 241, 0.05); border-radius: 16px; border: 1px solid var(--primary-glow);">
                            <h3 style="font-size: 0.8rem; color: var(--primary-light); margin-top: 0; text-transform: uppercase; font-family: 'Orbitron'; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;">
                                ⚡ Facturación Electrónica DIAN
                            </h3>
                            
                            <!-- Datos de Resolución -->
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border);">
                                <div style="grid-column: span 2;">
                                    <label style="font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Nro. Resolución Autorización</label>
                                    <input type="text" id="dian-resolucion" placeholder="Ej: 18760000001">
                                </div>
                                <div>
                                    <label style="font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Prefijo</label>
                                    <input type="text" id="dian-prefijo" placeholder="Ej: SETT">
                                </div>
                                <div>
                                    <label style="font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Vigencia (Meses)</label>
                                    <input type="number" id="dian-vigencia" placeholder="Ej: 12">
                                </div>
                                <div>
                                    <label style="font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Desde No.</label>
                                    <input type="number" id="dian-desde" placeholder="1">
                                </div>
                                <div>
                                    <label style="font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Hasta No.</label>
                                    <input type="number" id="dian-hasta" placeholder="5000">
                                </div>
                                <div style="grid-column: span 2;">
                                    <label style="font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Fecha de Resolución</label>
                                    <input type="date" id="dian-fecha-res">
                                </div>
                            </div>

                            <!-- Proveedor Tecnológico -->
                            <div style="margin-bottom: 15px;">
                                <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Proveedor Tecnológico (API)</label>
                                <select id="dian-proveedor" onchange="actualizarInterfazDian()">
                                    <!-- Se llena vía script -->
                                </select>
                            </div>

                            <div style="margin-bottom: 15px;">
                                <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Ambiente de Trabajo</label>
                                <select id="dian-ambiente">
                                    <option value="test">🧪 Pruebas (Set de Habilitación)</option>
                                    <option value="prod">🚀 Producción (Salida en Vivo)</option>
                                </select>
                            </div>

                            <!-- Campos Dinámicos según Proveedor -->
                            <div id="campos-dinamicos-dian" style="padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 15px;">
                                <!-- Se llena dinámicamente -->
                            </div>

                            <div style="margin-bottom: 10px;">
                                <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">URL API Final (Manual)</label>
                                <input type="text" id="dian-url" placeholder="https://api.proveedor.com/v1">
                            </div>
                        </div>

                        <div>
                            <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Logo de la Empresa (Para Reportes Excel)</label>
                            <input type="file" id="emp-logo" accept="image/*" onchange="previewLogo(event)" style="padding: 8px;">
                            <img id="logo-preview" style="max-height: 60px; margin-top: 10px; display: none; border-radius: 8px; border: 1px solid var(--border);">
                            <input type="hidden" id="emp-logo-b64">
                        </div>
                        <div>
                            <label style="font-size:0.7rem; color:var(--accent); text-transform:uppercase; font-weight:700;">Tema Visual del Sistema</label>
                            <select id="emp-tema" style="border-color: var(--accent);">
                                <option value="predefinido">Predefinido (Sin Efectos / Original)</option>
                                <option value="normal">Normal (Oscuro Pro)</option>
                                <option value="natural">Natural (Atenuado)</option>
                                <option value="vivido">Vívido (Saturado)</option>
                                <option value="cibernetico">Cibernético (Azul Neón)</option>
                                <option value="esmeralda">Esmeralda (Verde Vivo)</option>
                                <option value="atardecer">Atardecer (Naranja/Oro)</option>
                                <option value="galaxia">Galaxia (Morado Eléctrico)</option>
                                <option value="rubi">Rubí (Rojo Intenso)</option>
                            </select>
                        </div>
                        <button class="btn-save-user" onclick="guardarDatosEmpresa()" style="background: var(--primary);">GUARDAR DATOS EMPRESA</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>
        let configData = { categorias: [], unidades: [], empresa: {} };
        let usuariosData = [];

        async function cargarConfig() {
            try {
                const data = await API.getConfig();
                // Aseguramos que siempre existan los arreglos para evitar errores al hacer .push()
                configData = {
                    categorias: Array.isArray(data.categorias) ? data.categorias : [],
                    unidades: Array.isArray(data.unidades) ? data.unidades : [],
                    empresa: data.empresa || {},
                    bloquearRegistro: data.bloquearRegistro || false
                };
                
                document.getElementById('lock-reg-switch').checked = configData.bloquearRegistro;
                
                renderListaSimple(configData.categorias, 'lista-categorias', 'categorias');
                renderListaSimple(configData.unidades, 'lista-unidades', 'unidades');
                
                if (configData.empresa) {
                    document.getElementById('emp-nombre').value = configData.empresa.nombre || '';
                    document.getElementById('emp-nit').value = configData.empresa.nit || '';
                    document.getElementById('emp-direccion').value = configData.empresa.direccion || '';
                    document.getElementById('emp-telefono').value = configData.empresa.telefono || '';
                    document.getElementById('emp-proveedor').value = configData.empresa.proveedor || '';
                    document.getElementById('emp-regimen').value = configData.empresa.regimen || 'no-responsable';
                    document.getElementById('emp-iva-modo').value = configData.empresa.ivaModo || 'incluido';
                    document.getElementById('emp-correo').value = configData.empresa.correoFiscal || '';
                    document.getElementById('emp-municipio').value = configData.empresa.municipio || '';
                    document.getElementById('emp-depto').value = configData.empresa.departamento || '';
                    
                    // DIAN
                    const dProv = document.getElementById('dian-proveedor');
                    dProv.innerHTML = API.DIAN_PROVIDERS.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
                    dProv.value = configData.empresa.dianProveedor || 'custom';
                    
                    // Resolución
                    document.getElementById('dian-resolucion').value = configData.empresa.dianResolucion || '';
                    document.getElementById('dian-prefijo').value = configData.empresa.dianPrefijo || '';
                    document.getElementById('dian-vigencia').value = configData.empresa.dianVigencia || '';
                    document.getElementById('dian-desde').value = configData.empresa.dianDesde || '';
                    document.getElementById('dian-hasta').value = configData.empresa.dianHasta || '';
                    document.getElementById('dian-fecha-res').value = configData.empresa.dianFechaRes || '';
                    
                    // Datos API
                    document.getElementById('dian-url').value = configData.empresa.dianUrl || '';
                    document.getElementById('dian-ambiente').value = configData.empresa.dianAmbiente || 'test';
                    
                    // Cargar campos dinámicos primero y luego poner sus valores
                    actualizarInterfazDian();
                    for (const key in (configData.empresa.dianCampos || {})) {
                        const el = document.getElementById(`dian-f-${key}`);
                        if (el) el.value = configData.empresa.dianCampos[key];
                    }

                    document.getElementById('emp-logo-b64').value = configData.empresa.logoBase64 || '';
                    document.getElementById('emp-tema').value = configData.empresa.tema || 'normal';
                    
                    if (configData.empresa.tema) {
                        API.applyTheme(configData.empresa.tema);
                    }

                    if (configData.empresa.logoBase64) {
                        const preview = document.getElementById('logo-preview');
                        preview.src = configData.empresa.logoBase64;
                        preview.style.display = 'block';
                    }
                    
                    if(configData.empresa.nombre) {
                        document.getElementById('label-emp-nombre').innerText = configData.empresa.nombre;
                    }
                }
            } catch (e) { console.error("Error cargando config:", e); }
        }

        async function guardarDatosEmpresa() {
            try {
                const nuevoNombre = document.getElementById('emp-nombre').value.trim();
                const dianProvId = document.getElementById('dian-proveedor').value;
                const provMeta = API.DIAN_PROVIDERS.find(p => p.id === dianProvId);
                const camposDian = {};
                if (provMeta && provMeta.fields) {
                    provMeta.fields.forEach(f => {
                        camposDian[f] = document.getElementById(`dian-f-${f}`).value.trim();
                    });
                }

                configData.empresa = {
                    nombre: nuevoNombre,
                    nit: document.getElementById('emp-nit').value.trim(),
                    direccion: document.getElementById('emp-direccion').value.trim(),
                    telefono: document.getElementById('emp-telefono').value.trim(),
                    proveedor: document.getElementById('emp-proveedor').value.trim(),
                    regimen: document.getElementById('emp-regimen').value,
                    ivaModo: document.getElementById('emp-iva-modo').value,
                    correoFiscal: document.getElementById('emp-correo').value.trim(),
                    municipio: document.getElementById('emp-municipio').value.trim(),
                    departamento: document.getElementById('emp-depto').value.trim(),
                    
                    // DIAN
                    dianProveedor: dianProvId,
                    dianUrl: document.getElementById('dian-url').value.trim(),
                    dianAmbiente: document.getElementById('dian-ambiente').value,
                    dianResolucion: document.getElementById('dian-resolucion').value.trim(),
                    dianPrefijo: document.getElementById('dian-prefijo').value.trim(),
                    dianVigencia: document.getElementById('dian-vigencia').value.trim(),
                    dianDesde: document.getElementById('dian-desde').value.trim(),
                    dianHasta: document.getElementById('dian-hasta').value.trim(),
                    dianFechaRes: document.getElementById('dian-fecha-res').value,
                    dianCampos: camposDian,

                    logoBase64: document.getElementById('emp-logo-b64').value,
                    tema: document.getElementById('emp-tema').value
                };
                
                configData.bloquearRegistro = document.getElementById('lock-reg-switch').checked;
                
                const res = await API.saveConfig(configData);
                if(res.success) {
                    if(nuevoNombre) document.getElementById('label-emp-nombre').innerText = nuevoNombre;
                    alert("Datos de la empresa guardados correctamente");
                    toggleEmpresa();
                }
            } catch (e) { alert("Error al guardar datos de la empresa: " + e.message); }
        }

        async function guardarSeguridad() {
            try {
                const status = document.getElementById('lock-reg-switch').checked;
                configData.bloquearRegistro = status;
                
                const res = await API.saveConfig(configData);
                if(res.success) {
                    alert("Configuración de seguridad actualizada correctamente.\nEstado: " + (status ? "BLOQUEADO" : "ABIERTO"));
                }
            } catch (e) { alert("Error al guardar seguridad: " + e.message); }
        }

        function toggleEmpresa() {
            const el = document.getElementById('panel-empresa');
            el.classList.toggle('visible');
        }

        function actualizarInterfazDian() {
            const id = document.getElementById('dian-proveedor').value;
            const prov = API.DIAN_PROVIDERS.find(p => p.id === id);
            const container = document.getElementById('campos-dinamicos-dian');
            
            if (prov) {
                // Actualizar URL sugerida
                if (id !== 'custom') {
                    document.getElementById('dian-url').value = prov.url;
                }
                
                // Generar campos dinámicos
                let html = '';
                const fieldNames = {
                    token: 'Auth-Token / API Key (Alegra Token)',
                    account_id: 'Account ID (Dataico)',
                    email: 'Correo Electrónico Alegra',
                    user: 'Usuario de Acceso',
                    pass: 'Contraseña / Secret',
                    api_key: 'API Key (Siigo)'
                };

                const helpText = {
                    alegra: '<p style="font-size:0.65rem; color:var(--primary-light); margin-top:5px; opacity:0.8;">Obtén tu token en Alegra: <b>Configuración > API</b></p>'
                };

                if (prov.fields) {
                    prov.fields.forEach(f => {
                        html += `
                            <div style="margin-bottom: 10px;">
                                <label style="font-size:0.6rem; color:var(--warning); text-transform:uppercase; font-weight:700;">${fieldNames[f] || f}</label>
                                <input type="text" id="dian-f-${f}" placeholder="Ingrese ${f}" style="background: rgba(255,255,255,0.05);">
                            </div>
                        `;
                    });
                }
                container.innerHTML = (html + (helpText[id] || '')) || '<p style="font-size:0.7rem; color:var(--text-muted);">No requiere campos adicionales.</p>';
            }
        }

        function previewLogo(event) {
            const file = event.target.files[0];
            if (file) {
                // Verificar tamaño básico
                if (file.size > 5 * 1024 * 1024) { // 5MB límite razonable para un logo
                    alert("La imagen es muy pesada. Intente con una de menos de 5MB.");
                    event.target.value = "";
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const b64 = e.target.result;
                    document.getElementById('emp-logo-b64').value = b64;
                    const preview = document.getElementById('logo-preview');
                    preview.src = b64;
                    preview.style.display = 'block';
                    console.log("Logo cargado en memoria (previsualización)");
                }
                reader.onerror = function() {
                    alert("Error al leer el archivo de imagen.");
                }
                reader.readAsDataURL(file);
            }
        }

        async function cargarUsuarios() {
            try {
                usuariosData = await API.getUsuarios();
                document.getElementById('lista-usuarios').innerHTML = usuariosData.map((u, i) => `
                    <div class="user-row">
                        <div class="user-header" onclick="toggleEdit(${i})">
                            <span style="font-weight:700; color:var(--primary);">${u.nombre}</span>
                            <span class="badge badge-${u.rol}">${u.rol}</span>
                        </div>
                        <div id="panel-${i}" class="user-edit-panel">
                            <label style="font-size:0.65rem; color:var(--text-muted);">NOMBRE COMPLETO</label>
                            <input type="text" id="edit-nom-${i}" value="${u.nombre}">
                            
                            <div class="permisos-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin: 15px 0;">
                                <div class="permiso-row">
                                    <span style="font-size:0.75rem;">Editar Precio</span>
                                    <label class="switch"><input type="checkbox" id="edit-permiso-${i}" ${u.canEditPrice ? 'checked' : ''}><span class="slider"></span></label>
                                </div>
                                <div class="permiso-row">
                                    <span style="font-size:0.75rem;">Excel</span>
                                    <label class="switch"><input type="checkbox" id="edit-excel-${i}" ${u.permExcel ? 'checked' : ''}><span class="slider"></span></label>
                                </div>
                                <div class="permiso-row">
                                    <span style="font-size:0.75rem;">Imprimir</span>
                                    <label class="switch"><input type="checkbox" id="edit-print-${i}" ${u.permPrint ? 'checked' : ''}><span class="slider"></span></label>
                                </div>
                                <div class="permiso-row">
                                    <span style="font-size:0.75rem;">Ticket</span>
                                    <label class="switch"><input type="checkbox" id="edit-ticket-${i}" ${u.permTicket ? 'checked' : ''}><span class="slider"></span></label>
                                </div>
                                <div class="permiso-row">
                                    <span style="font-size:0.75rem;">WhatsApp</span>
                                    <label class="switch"><input type="checkbox" id="edit-wa-${i}" ${u.permWA ? 'checked' : ''}><span class="slider"></span></label>
                                </div>
                                <div class="permiso-row">
                                    <span style="font-size:0.75rem; color:var(--accent);">Dian [F11]</span>
                                    <label class="switch"><input type="checkbox" id="edit-dian-${i}" ${u.permDian ? 'checked' : ''}><span class="slider"></span></label>
                                </div>
                            </div>

                            <label style="font-size:0.65rem; color:var(--text-muted);">ID USUARIO / LOGIN</label>
                            <input type="text" id="edit-user-${i}" value="${u.user}">
                            <label style="font-size:0.65rem; color:var(--text-muted);">CONTRASEÑA</label>
                            <input type="text" id="edit-pass-${i}" value="${u.pass}">
                            <label style="font-size:0.65rem; color:var(--text-muted);">ROL</label>
                            <select id="edit-rol-${i}" style="width:100%; margin-bottom:15px; padding:10px; background:rgba(0,0,0,0.3); color:white; border:1px solid var(--border); border-radius:8px;">
                                <option value="admin" ${u.rol === 'admin' ? 'selected' : ''}>Administrador</option>
                                <option value="cliente" ${u.rol === 'cliente' ? 'selected' : ''}>Vendedor / Cliente</option>
                            </select>
                            
                            <button class="btn-save-user" onclick="guardarUsuario(${i})" style="background:var(--success);">GUARDAR CAMBIOS</button>
                            ${u.user !== 'admin' ? `<button class="btn-text-del" style="width:100%; margin-top:10px; color:var(--danger);" onclick="eliminarUsuario(${i})">ELIMINAR USUARIO</button>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error("Error cargando usuarios:", e); }
        }

        // --- FUNCIONES DE ACCIÓN ---
        function renderListaSimple(array, elementId, key) {
            document.getElementById(elementId).innerHTML = array.map((item, index) => `
                <div class="list-item">
                    <span style="font-weight:500;">${item}</span>
                    <button class="btn-text-del" onclick="eliminarConfig('${key}', ${index})">Eliminar</button>
                </div>
            `).join('');
        }

        async function agregarConfig(key, inputId) {
            try {
                const input = document.getElementById(inputId);
                const val = input.value.trim();
                if (!val) return;
                configData[key].push(val);
                const res = await API.saveConfig(configData);
                if(res.success) {
                    input.value = '';
                    cargarConfig();
                } else {
                    throw new Error(res.error || "No se pudo guardar la configuración");
                }
            } catch (e) {
                alert("Error al agregar: " + e.message);
                cargarConfig(); // Recargar para limpiar cambios fallidos en memoria
            }
        }

        async function eliminarConfig(key, index) {
            try {
                if(!confirm("¿Estás seguro de eliminar este elemento?")) return;
                configData[key].splice(index, 1);
                const res = await API.saveConfig(configData);
                if(res.success) {
                  cargarConfig();
                } else {
                    throw new Error(res.error || "No se pudo eliminar");
                }
            } catch (e) {
                alert("Error al eliminar: " + e.message);
                cargarConfig();
            }
        }

        function toggleEdit(idx) {
            const el = document.getElementById(`panel-${idx}`);
            const v = el.classList.contains('visible');
            document.querySelectorAll('.user-edit-panel').forEach(p => p.classList.remove('visible'));
            if (!v) el.classList.add('visible');
        }

        async function guardarUsuario(idx) {
            try {
                const updatedUser = {
                    nombre: document.getElementById(`edit-nom-${idx}`).value.trim(),
                    user: document.getElementById(`edit-user-${idx}`).value.trim(),
                    pass: document.getElementById(`edit-pass-${idx}`).value.trim(),
                    rol: document.getElementById(`edit-rol-${idx}`).value,
                    canEditPrice: document.getElementById(`edit-permiso-${idx}`).checked,
                    permExcel: document.getElementById(`edit-excel-${idx}`).checked,
                    permPrint: document.getElementById(`edit-print-${idx}`).checked,
                    permTicket: document.getElementById(`edit-ticket-${idx}`).checked,
                    permWA: document.getElementById(`edit-wa-${idx}`).checked,
                    permDian: document.getElementById(`edit-dian-${idx}`).checked
                };
                
                // Backup por si falla
                const oldUser = {...usuariosData[idx]};
                usuariosData[idx] = updatedUser;

                const res = await API.saveUsuarios(usuariosData);
                if(res.success) {
                    alert("Usuario actualizado correctamente.");
                    cargarUsuarios();
                } else {
                    usuariosData[idx] = oldUser; // Revertir
                    throw new Error(res.error || "Error en el servidor");
                }
            } catch (error) { 
                console.error(error);
                alert("Error al guardar: " + error.message); 
                cargarUsuarios();
            }
        }

        async function eliminarUsuario(idx) {
            try {
                const u = usuariosData[idx];
                if(u.user === 'admin') return alert("No se puede eliminar el administrador principal.");
                if(!confirm(`¿Estás seguro de eliminar al usuario "${u.nombre}"?`)) return;
                
                // Hacer una copia local por si falla la sincronización
                const backup = [...usuariosData];
                usuariosData.splice(idx, 1);
                
                const res = await API.saveUsuarios(usuariosData);
                if(res.success) {
                    alert("Usuario eliminado correctamente.");
                    cargarUsuarios();
                } else {
                    usuariosData = backup; // Revertir
                    throw new Error(res.error || "Error en el servidor");
                }
            } catch (e) {
                console.error(e);
                alert("No se pudo eliminar el usuario: " + e.message + "\nVerifique la conexión con el servidor.");
                cargarUsuarios(); // Recargar estado real del servidor
            }
        }

        window.onload = () => {
            cargarConfig();
            cargarUsuarios();
        };
    </script>
</body>
</html>
